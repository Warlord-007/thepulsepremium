name: Extract ZIP File

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Unzip workspace.zip
        run: |
          unzip -o workspace.zip
          rm workspace.zip

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-extract workspace.zip"
          git push
